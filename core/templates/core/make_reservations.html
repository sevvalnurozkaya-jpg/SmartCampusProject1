<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservation Management</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 30px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 18px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .back-btn:hover {
            background-color: #1abc9c;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            color: #2c3e50;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 400px;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card-body {
            padding: 40px;
            text-align: center;
            color: white;
        }

        .green {
            background: linear-gradient(135deg, #1abc9c, #16a085);
        }

        .blue {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .icon-circle {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            margin-top: 20px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .green .btn {
            color: #16a085;
        }

        .blue .btn {
            color: #2980b9;
        }
    </style>
</head>

<body>

    <a href="{% url 'student_dashboard' %}" class="back-btn">← Back</a>

    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-ticket-alt"></i> Reservation Management
        </h1>
        <p>Choose what you want to do today.</p>
    </div>

    <div class="row">

        <div class="card">
            <div class="card-body green">
                <div class="icon-circle">
                    <i class="fas fa-plus-circle"></i>
                </div>

                <h2>Make a New Booking</h2>
                <p>Reserve Study Rooms, Sports Facilities, or Equipment.</p>

                <a href="{% url 'field_list' %}" class="btn">
                    Go to Field List →
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-body blue">
                <div class="icon-circle">
                    <i class="fas fa-history"></i>
                </div>

                <h2>View My Bookings</h2>
                <p>Check your reservations and history.</p>

                <a href="{% url 'reservation_history' %}" class="btn">
                    View My History →
                </a>
            </div>
        </div>

    </div>

</body>
</html>
