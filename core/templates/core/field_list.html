<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Reservation</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f6f8; padding: 30px; }
        .back-btn { display: inline-block; margin-bottom: 25px; padding: 10px 18px; background-color: #2c3e50; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .back-btn:hover { background-color: #1abc9c; }
        .header-card { color: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .study-header { background: linear-gradient(45deg, #1abc9c, #16a085); }
        .sports-header { background: linear-gradient(45deg, #3498db, #2980b9); }
        .equipment-header { background: linear-gradient(45deg, #9b59b6, #8e44ad); }
        .header-card h2 { margin: 0; font-size: 28px; }
        .header-card p { margin-bottom: 0; opacity: 0.85; }
        .form-card { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 18px rgba(0,0,0,0.1); margin-bottom: 45px; }
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 220px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; color: #555; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; font-size: 15px; box-sizing: border-box; }
        .submit-btn { width: 100%; margin-top: 15px; padding: 15px; border: none; border-radius: 12px; background-color: #2c3e50; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .submit-btn:hover { background-color: #1abc9c; }
        .info-text { color: #777; font-size: 14px; margin-top: 6px; }
    </style>
</head>

<body>

<a href="{% url 'my_reservations' %}" class="back-btn">← Back</a>

<!-- STUDY ROOM -->
<div class="header-card study-header">
    <h2><i class="fas fa-book"></i> Book a Study Room</h2>
    <p>Choose the best spot for your session.</p>
</div>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="reservation_type" value="study">

        <div class="form-row">
            <div class="form-group">
                <label>Select Study Room</label>
                <select name="room_id" required>
                    <option value="" disabled selected>Choose here...</option>
                    <option value="1">Study Room 1</option>
                    <option value="2">Study Room 2</option>
                    <option value="3">Study Room 3</option>
                    <option value="4">Study Room 4</option>
                    <option value="5">Study Room 5</option>
                    <option value="6">Study Room 6</option>
                    <option value="7">Study Room 7</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="res_date" required>
            </div>

            <div class="form-group">
                <label>Time Slot</label>
                <select name="time_slot" required>
                    <option value="" disabled selected>Choose time...</option>
                    <option value="00:00-01:00">00:00 - 01:00</option>
                    <option value="01:00-02:00">01:00 - 02:00</option>
                    <option value="02:00-03:00">02:00 - 03:00</option>
                    <option value="03:00-04:00">03:00 - 04:00</option>
                    <option value="04:00-05:00">04:00 - 05:00</option>
                    <option value="05:00-06:00">05:00 - 06:00</option>
                    <option value="06:00-07:00">06:00 - 07:00</option>
                    <option value="07:00-08:00">07:00 - 08:00</option>
                    <option value="08:00-09:00">08:00 - 09:00</option>
                    <option value="09:00-10:00">09:00 - 10:00</option>
                    <option value="10:00-11:00">10:00 - 11:00</option>
                    <option value="11:00-12:00">11:00 - 12:00</option>
                    <option value="12:00-13:00">12:00 - 13:00</option>
                    <option value="13:00-14:00">13:00 - 14:00</option>
                    <option value="14:00-15:00">14:00 - 15:00</option>
                    <option value="15:00-16:00">15:00 - 16:00</option>
                    <option value="16:00-17:00">16:00 - 17:00</option>
                    <option value="17:00-18:00">17:00 - 18:00</option>
                    <option value="18:00-19:00">18:00 - 19:00</option>
                    <option value="19:00-20:00">19:00 - 20:00</option>
                    <option value="20:00-21:00">20:00 - 21:00</option>
                    <option value="21:00-22:00">21:00 - 22:00</option>
                    <option value="22:00-23:00">22:00 - 23:00</option>
                    <option value="23:00-00:00">23:00 - 00:00</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-check-circle"></i> Confirm Study Room Reservation
        </button>
    </form>
</div>

<!-- SPORTS FACILITY -->
<div class="header-card sports-header">
    <h2><i class="fas fa-running"></i> Book a Sports Facility</h2>
    <p>Reserve a sports area for your activity.</p>
</div>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="reservation_type" value="sports">

        <div class="form-row">
            <div class="form-group">
                <label>Select Sports Facility</label>
                <select name="field_id" required>
                    <option value="" disabled selected>Choose here...</option>
                    <option value="football_field">Football Field</option>
                    <option value="basketball_court">Basketball Court</option>
                    <option value="volleyball_court">Volleyball Court</option>
                    <option value="tennis_court">Tennis Court</option>
                    <option value="fitness_room">Fitness Room</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="res_date" required>
            </div>

            <div class="form-group">
                <label>Time Slot</label>
                <select name="time_slot" required>
                    <option value="" disabled selected>Choose time...</option>
                    <option value="06:00-07:00">06:00 - 07:00</option>
                    <option value="07:00-08:00">07:00 - 08:00</option>
                    <option value="08:00-09:00">08:00 - 09:00</option>
                    <option value="09:00-10:00">09:00 - 10:00</option>
                    <option value="10:00-11:00">10:00 - 11:00</option>
                    <option value="11:00-12:00">11:00 - 12:00</option>
                    <option value="12:00-13:00">12:00 - 13:00</option>
                    <option value="13:00-14:00">13:00 - 14:00</option>
                    <option value="14:00-15:00">14:00 - 15:00</option>
                    <option value="15:00-16:00">15:00 - 16:00</option>
                    <option value="16:00-17:00">16:00 - 17:00</option>
                    <option value="17:00-18:00">17:00 - 18:00</option>
                    <option value="18:00-19:00">18:00 - 19:00</option>
                    <option value="19:00-20:00">19:00 - 20:00</option>
                    <option value="20:00-21:00">20:00 - 21:00</option>
                    <option value="21:00-22:00">21:00 - 22:00</option>
                    <option value="22:00-23:00">22:00 - 23:00</option>
                    <option value="23:00-00:00">23:00 - 00:00</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-check-circle"></i> Confirm Sports Facility Reservation
        </button>
    </form>
</div>

<!-- SPORT EQUIPMENT -->
<div class="header-card equipment-header">
    <h2><i class="fas fa-dumbbell"></i> Rent Sport Equipment</h2>
    <p>Choose equipment you want to borrow.</p>
</div>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="reservation_type" value="equipment">

        <div class="form-row">
            <div class="form-group">
                <label>Select Sport Equipment</label>
                <select name="equipment_id" required>
                    <option value="" disabled selected>Choose here...</option>
                    <option value="football_ball">Football Ball</option>
                    <option value="basketball_ball">Basketball Ball</option>
                    <option value="volleyball_ball">Volleyball Ball</option>
                    <option value="tennis_racket">Tennis Racket</option>
                    <option value="badminton_racket">Badminton Racket</option>
                    <option value="training_cones">Training Cones</option>
                    <option value="jump_rope">Jump Rope</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="res_date" required>
            </div>

            <div class="form-group">
                <label>Time Slot</label>
                <select name="time_slot" required>
                    <option value="" disabled selected>Choose time...</option>
                    <option value="06:00-07:00">06:00 - 07:00</option>
                    <option value="07:00-08:00">07:00 - 08:00</option>
                    <option value="08:00-09:00">08:00 - 09:00</option>
                    <option value="09:00-10:00">09:00 - 10:00</option>
                    <option value="10:00-11:00">10:00 - 11:00</option>
                    <option value="11:00-12:00">11:00 - 12:00</option>
                    <option value="12:00-13:00">12:00 - 13:00</option>
                    <option value="13:00-14:00">13:00 - 14:00</option>
                    <option value="14:00-15:00">14:00 - 15:00</option>
                    <option value="15:00-16:00">15:00 - 16:00</option>
                    <option value="16:00-17:00">16:00 - 17:00</option>
                    <option value="17:00-18:00">17:00 - 18:00</option>
                    <option value="18:00-19:00">18:00 - 19:00</option>
                    <option value="19:00-20:00">19:00 - 20:00</option>
                    <option value="20:00-21:00">20:00 - 21:00</option>
                    <option value="21:00-22:00">21:00 - 22:00</option>
                    <option value="22:00-23:00">22:00 - 23:00</option>
                    <option value="23:00-00:00">23:00 - 00:00</option>
                </select>
            </div>
        </div>

        <button type="submit" class="submit-btn">
            <i class="fas fa-check-circle"></i> Confirm Equipment Rental
        </button>
    </form>
</div>

</body>
</html>
