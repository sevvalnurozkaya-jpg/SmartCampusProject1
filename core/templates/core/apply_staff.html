{% extends "base.html" %}

{% block content %}

<div style="max-width: 850px; margin: 50px auto;">

    <div style="background:white; border-radius:22px; padding:35px; box-shadow:0 8px 24px rgba(0,0,0,0.07);">

        <div style="margin-bottom:28px;">
            <h2 style="margin:0; color:#111827; font-size:30px;">
                <i class="fas fa-user-tie" style="color:#2563eb; margin-right:10px;"></i>
                Apply for Staff
            </h2>

            <p style="color:#6b7280; margin-top:10px;">
                Submit your request to become a staff member in the Smart Campus system.
            </p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom:24px;">
                <label style="display:block; font-weight:700; margin-bottom:10px; color:#374151;">
                    Why do you want to become a staff member?
                </label>

                <textarea
                    name="motivation"
                    rows="7"
                    required
                    placeholder="Briefly explain your reason..."
                    style="width:100%; padding:15px; border-radius:14px; border:1px solid #d1d5db; font-size:15px; resize:vertical;"
                ></textarea>
            </div>

            <div style="display:flex; gap:14px; align-items:center;">
                <button
                    type="submit"
                    style="border:none; background:#2563eb; color:white; padding:13px 22px; border-radius:12px; font-weight:bold; cursor:pointer;"
                >
                    Submit Application
                </button>

                <a
                    href="{% url 'student_dashboard' %}"
                    style="text-decoration:none; background:#f3f4f6; color:#374151; padding:13px 22px; border-radius:12px; font-weight:bold;"
                >
                    Back to Student Dashboard
                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
